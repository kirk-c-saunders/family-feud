<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famly Feud</title>
    <link rel="stylesheet" href="./css/game.css">
</head>
<body>
    <main id="main-grid">
        <section id="game-name-teams-and-question">
            <h2 id="game-name">Playing Family Feud with Friends</h1>
            <hr id="between-game-name-and-team-stats">
            <div id="team-1-mobile" class="team-stats-mobile">
                <div id="team-1-name-mobile">Team 1</div>
                <div id="team-1-score-mobile">0</div>
                <div id="team-1-score-current-player">Kirk</div>
            </div>
            <div id="team-2-mobile" class="team-stats-mobile">
                <div id="team-2-name-mobile">Team 2</div>
                <div id="team-2-score-mobile">0</div>
                <div id="team-2-score-current-player">Tori</div>
            </div>
            <hr id="between-team-stats-and-question">
            <div id="question">How much wood, would a woodchuck chuck, if a woodchuck could chuck wood?</div>
        </section>
        <section id="round-stats">
            <div id="timer">3:00</div>
            <div id="round-score">0</div>
            <div id="incorrect-response-count">XXX</div>
        </section>
        <section id="answer-grid">
            <div id="answer-1" class="hover hidden-answer">
                <div id="answer-1-text">As much as they want</div>
                <div id="answer-1-points">50</div>
            </div>
            <div id="answer-2" class="hover hidden-answer">
                <div id="answer-2-text">As much as a woodchuck could chuck wood</div>
                <div id="answer-2-points">30</div>
            </div>
            <div id="answer-3" class="hover hidden-answer">
                <div id="answer-3-text">None/They Don't</div>
                <div id="answer-3-points">20</div>
            </div>
        </section>
        <div id="incorrect-anwer" class="hover">Incorrect Answer</div>
        <div id="team-1-wins-round" class="hover">[Team 1] Wins Round</div>
        <div id="team-2-wins-round" class="hover">[Team 2] Wins Round</div>
    </main>

    <script type="module" src="./js/createGame.js"></script>
</body>
</html>
